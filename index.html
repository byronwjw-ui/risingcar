<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏎️ F1赛车大冒险 - 超级版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at center, #0b1a3a 0%, #050a1c 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px;
  }
  h1 {
    color: #ff3b3b;
    text-shadow: 0 0 12px rgba(255,59,59,.7), 0 0 28px rgba(255,59,59,.45);
    font-size: clamp(20px, 2.4vw, 32px);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .stage {
    position: relative;
    width: min(92vw, 900px);
    aspect-ratio: 4 / 3;
    border: 4px solid #ff3b3b;
    border-radius: 12px;
    box-shadow: 0 0 24px rgba(255,59,59,.55), inset 0 0 30px rgba(255,59,59,.15);
    background: #000;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    font-weight: 700;
  }
  .hud .panel {
    position: absolute;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px;
    padding: 8px 12px;
    backdrop-filter: blur(4px);
  }
  .speed { top: 12px; left: 12px; }
  .speed .num { color: #21d36b; font-size: 30px; line-height: 1; text-shadow: 0 0 10px #21d36b88; }
  .speed .lbl { color: #9bb1a8; font-size: 11px; letter-spacing: 1px; }
  .stats { top: 12px; right: 12px; text-align: right; }
  .stats .row { font-size: 14px; margin: 2px 0; }
  .stats .score { color: #ddd; }
  .stats .level { color: #ffd24a; }
  .stats .nitro { color: #5ad7ff; }
  .stats .coins { color: #ffcc44; }

  .watermark {
    position: absolute; bottom: 8px; left: 12px;
    color: #ff3b3b; font-weight: 900; letter-spacing: 3px;
    font-style: italic; opacity: .6;
    text-shadow: 0 0 6px #ff3b3b88;
  }
  .hi {
    position: absolute; bottom: 8px; right: 12px;
    color: #ffcc44; font-size: 13px; opacity: .85;
  }

  .overlay {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(2px);
    text-align: center; padding: 20px;
    pointer-events: auto;
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    font-size: clamp(36px, 6vw, 72px);
    color: #ff3b3b;
    text-shadow: 0 0 18px rgba(255,59,59,.8);
    margin-bottom: 18px;
    letter-spacing: 4px;
  }
  .overlay p { font-size: 18px; margin: 6px 0; color: #eee; }
  .btn {
    margin-top: 22px;
    background: linear-gradient(180deg, #ff5a5a, #d92a2a);
    border: none;
    color: #fff; font-weight: 800;
    padding: 14px 34px;
    border-radius: 999px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255,59,59,.6);
    transition: transform .1s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(255,59,59,.9); }
  .btn:active { transform: translateY(0); }

  .controls {
    margin-top: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: #cfd6e4; font-size: 14px;
  }
  .controls .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .key {
    display: inline-block;
    background: linear-gradient(180deg,#ff4747,#c81e1e);
    color:#fff; font-weight:800;
    min-width: 38px; padding: 6px 10px;
    border-radius: 8px; text-align:center;
    box-shadow: 0 2px 0 #5a0606, 0 0 10px rgba(255,59,59,.5);
  }
  .hint { color:#9aa6bd; font-size:13px; }

  /* Mobile touch buttons */
  .touch {
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 14px;
    pointer-events: none;
  }
  .touch .group { display: flex; gap: 10px; pointer-events: auto; }
  .tbtn {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(255,59,59,.35);
    border: 2px solid rgba(255,59,59,.7);
    color: #fff; font-size: 24px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active { background: rgba(255,59,59,.6); }

  @media (max-width: 720px) {
    .touch { display: flex; }
    h1 { font-size: 20px; }
    .controls { font-size: 12px; }
  }

  /* damage flash */
  .stage.hit::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(255,0,0,.5), transparent 70%);
    animation: flash .35s ease-out;
    pointer-events: none;
  }
  @keyframes flash { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🏎️ F1赛车大冒险 - 超级版 🏎️</h1>

    <div class="stage" id="stage">
      <canvas id="game" width="800" height="600"></canvas>

      <div class="hud">
        <div class="panel speed">
          <div class="num" id="speed">90</div>
          <div class="lbl">km/h</div>
        </div>
        <div class="panel stats">
          <div class="row score">得分: <span id="score">0</span></div>
          <div class="row level">速度等级: <span id="level">1</span></div>
          <div class="row nitro">氮气: <span id="nitro">0</span></div>
          <div class="row coins">金币: <span id="coins">0</span></div>
        </div>
        <div class="watermark">F1 RACING</div>
        <div class="hi">🏆 最高分: <span id="hi">0</span></div>
      </div>

      <!-- Start overlay -->
      <div class="overlay show" id="startOverlay">
        <h2>准备出发</h2>
        <p>使用 ← → 移动，↑ 临时加速，N 释放氮气</p>
        <p>💰 金币 +20 分 &nbsp; | &nbsp; 🛡️ 护盾 5 秒无敌 &nbsp; | &nbsp; 每 100 分获得 1 次氮气</p>
        <button class="btn" id="startBtn">🚦 开始游戏</button>
      </div>

      <!-- Game over overlay -->
      <div class="overlay" id="overOverlay">
        <h2>GAME OVER</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>速度等级: <span id="finalLevel">1</span></p>
        <p>最高分: <span id="finalHi">0</span></p>
        <button class="btn" id="restartBtn">🔁 点击重新开始</button>
      </div>

      <!-- Touch controls -->
      <div class="touch">
        <div class="group">
          <div class="tbtn" id="tLeft">◀</div>
          <div class="tbtn" id="tRight">▶</div>
        </div>
        <div class="group">
          <div class="tbtn" id="tBoost">⤴</div>
          <div class="tbtn" id="tNitro">N</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="row">
        使用 <span class="key">←</span><span class="key">→</span> 移动
        | <span class="key">↑</span> 临时加速
        | <span class="key">N</span> 氮气
        | <span class="key">P</span> 暂停
      </div>
      <div class="hint">收集 💰 金币 +20分 &nbsp;|&nbsp; 🛡️ 护盾 5秒无敌 &nbsp;|&nbsp; 每 100 分获得 1 次氮气</div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const stage = document.getElementById('stage');
  const speedEl = document.getElementById('speed');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const nitroEl = document.getElementById('nitro');
  const coinsEl = document.getElementById('coins');
  const hiEl = document.getElementById('hi');

  const startOverlay = document.getElementById('startOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalLevelEl = document.getElementById('finalLevel');
  const finalHiEl = document.getElementById('finalHi');

  // Road layout
  const ROAD_LEFT = 110;
  const ROAD_RIGHT = W - 110;
  const ROAD_W = ROAD_RIGHT - ROAD_LEFT;
  const LANES = 4;
  const LANE_W = ROAD_W / LANES;
  const laneCenter = i => ROAD_LEFT + LANE_W * (i + 0.5);

  // Game state
  const state = {
    running: false,
    paused: false,
    over: false,
    score: 0,
    coins: 0,
    nitro: 0,
    level: 1,
    speed: 6,          // world scroll speed
    baseSpeed: 6,
    nitroActive: 0,    // frames left
    boostActive: 0,    // ↑ key boost frames
    shield: 0,         // frames left
    invuln: 0,         // post-hit i-frames
    spawnCD: 0,
    coinCD: 0,
    powerCD: 0,
    roadOffset: 0,
    hi: parseInt(localStorage.getItem('f1_hi') || '0', 10),
    lastScoreNitro: 0,
  };
  hiEl.textContent = state.hi;

  // Player
  const player = {
    x: W / 2, y: H - 90,
    w: 44, h: 78,
    targetLane: 2, // will recenter
    vx: 0,
  };

  // Entities
  let obstacles = []; // cars + cones
  let coins = [];
  let powers = [];   // shield, nitro pickups
  let particles = [];
  let bgStars = [];

  // Init stars
  for (let i = 0; i < 60; i++) {
    bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.2, s: Math.random()*0.6+0.2 });
  }

  // Input
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'n' || e.key === 'N') tryNitro();
    if (e.key === 'p' || e.key === 'P') togglePause();
    if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // Touch controls
  const bindHold = (el, key) => {
    const on = (e) => { e.preventDefault(); keys[key] = true; };
    const off = (e) => { e.preventDefault(); keys[key] = false; };
    el.addEventListener('touchstart', on, {passive:false});
    el.addEventListener('touchend', off);
    el.addEventListener('touchcancel', off);
    el.addEventListener('mousedown', on);
    el.addEventListener('mouseup', off);
    el.addEventListener('mouseleave', off);
  };
  bindHold(document.getElementById('tLeft'), 'arrowleft');
  bindHold(document.getElementById('tRight'), 'arrowright');
  bindHold(document.getElementById('tBoost'), 'arrowup');
  document.getElementById('tNitro').addEventListener('click', tryNitro);

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  function startGame() {
    state.running = true;
    state.paused = false;
    state.over = false;
    state.score = 0;
    state.coins = 0;
    state.nitro = 0;
    state.level = 1;
    state.baseSpeed = 6;
    state.speed = state.baseSpeed;
    state.nitroActive = 0;
    state.boostActive = 0;
    state.shield = 0;
    state.invuln = 60;
    state.spawnCD = 0;
    state.coinCD = 60;
    state.powerCD = 300;
    state.roadOffset = 0;
    state.lastScoreNitro = 0;

    obstacles = []; coins = []; powers = []; particles = [];

    player.x = laneCenter(1);
    player.targetLane = 1;
    player.vx = 0;

    startOverlay.classList.remove('show');
    overOverlay.classList.remove('show');
    updateHUD();
  }

  function gameOver() {
    state.running = false;
    state.over = true;
    if (state.score > state.hi) {
      state.hi = state.score;
      localStorage.setItem('f1_hi', String(state.hi));
    }
    finalScoreEl.textContent = state.score;
    finalLevelEl.textContent = state.level;
    finalHiEl.textContent = state.hi;
    hiEl.textContent = state.hi;
    overOverlay.classList.add('show');
  }

  function togglePause() {
    if (!state.running) return;
    state.paused = !state.paused;
  }

  function tryNitro() {
    if (!state.running || state.paused) return;
    if (state.nitro > 0 && state.nitroActive <= 0) {
      state.nitro--;
      state.nitroActive = 120; // 2s @ 60fps
      // burst particles
      for (let i = 0; i < 24; i++) {
        particles.push({
          x: player.x + (Math.random()-0.5)*20,
          y: player.y + player.h/2,
          vx: (Math.random()-0.5)*2,
          vy: Math.random()*4+3,
          life: 30+Math.random()*20,
          color: ['#5ad7ff','#a0f0ff','#ffffff'][Math.floor(Math.random()*3)],
          r: Math.random()*3+1.5,
        });
      }
      updateHUD();
    }
  }

  function spawnObstacle() {
    // 4 lanes; spawn 1 obstacle, sometimes 2 (with a guaranteed gap)
    const lane = Math.floor(Math.random()*LANES);
    const isCar = Math.random() < 0.65;
    const w = isCar ? 44 : 30;
    const h = isCar ? 78 : 36;
    obstacles.push({
      lane, x: laneCenter(lane), y: -h - 10,
      w, h, type: isCar ? 'car' : 'cone',
      color: isCar ? ['#ffb400','#4ade80','#60a5fa','#f472b6','#a78bfa'][Math.floor(Math.random()*5)] : '#ff7a00',
      // slow down opponents a bit so player can pass at high speed
      vy: isCar ? -1.5 : 0,
    });
    // chance for second in another lane
    if (Math.random() < 0.35 && state.level >= 2) {
      let l2 = Math.floor(Math.random()*LANES);
      if (l2 === lane) l2 = (l2+1) % LANES;
      // never spawn 3-wide blockade
      const isCar2 = Math.random() < 0.6;
      const w2 = isCar2 ? 44 : 30, h2 = isCar2 ? 78 : 36;
      obstacles.push({
        lane: l2, x: laneCenter(l2), y: -h2 - 10 - Math.random()*60,
        w: w2, h: h2, type: isCar2 ? 'car' : 'cone',
        color: isCar2 ? '#ef4444' : '#ff7a00',
        vy: isCar2 ? -1.2 : 0,
      });
    }
  }

  function spawnCoin() {
    const lane = Math.floor(Math.random()*LANES);
    // sometimes a row of 3
    const row = Math.random() < 0.5 ? 3 : 1;
    for (let i = 0; i < row; i++) {
      coins.push({
        x: laneCenter(lane),
        y: -20 - i*28,
        r: 11,
        spin: Math.random()*Math.PI*2,
      });
    }
  }

  function spawnPower() {
    const lane = Math.floor(Math.random()*LANES);
    const kind = Math.random() < 0.55 ? 'shield' : 'nitro';
    powers.push({
      x: laneCenter(lane), y: -24, r: 16, kind,
      bob: Math.random()*Math.PI*2,
    });
  }

  function rectsOverlap(a, b) {
    return Math.abs(a.x - b.x) < (a.w + b.w)/2 - 4 &&
           Math.abs(a.y - b.y) < (a.h + b.h)/2 - 4;
  }
  function circleRect(c, r) {
    const dx = Math.abs(c.x - r.x) - r.w/2;
    const dy = Math.abs(c.y - r.y) - r.h/2;
    if (dx > c.r || dy > c.r) return false;
    if (dx <= 0 || dy <= 0) return true;
    return dx*dx + dy*dy <= c.r*c.r;
  }

  function updateHUD() {
    speedEl.textContent = Math.round(state.speed * 15);
    scoreEl.textContent = state.score;
    levelEl.textContent = state.level;
    nitroEl.textContent = state.nitro;
    coinsEl.textContent = state.coins;
  }

  function update() {
    if (!state.running || state.paused) return;

    // Speed dynamics
    let curSpeed = state.baseSpeed;
    if (state.boostActive > 0) { curSpeed *= 1.45; state.boostActive--; }
    if (state.nitroActive > 0) { curSpeed *= 2.2; state.nitroActive--; }
    state.speed = curSpeed;

    state.roadOffset = (state.roadOffset + state.speed) % 80;

    // Player horizontal control - lane based with smooth glide
    const leftP  = keys['arrowleft']  || keys['a'];
    const rightP = keys['arrowright'] || keys['d'];
    const upP    = keys['arrowup']    || keys['w'];

    if (leftP && !state._lk) { player.targetLane = Math.max(0, player.targetLane - 1); }
    if (rightP && !state._rk) { player.targetLane = Math.min(LANES-1, player.targetLane + 1); }
    state._lk = leftP; state._rk = rightP;

    if (upP && state.boostActive <= 0) state.boostActive = 8;

    const tx = laneCenter(player.targetLane);
    player.x += (tx - player.x) * 0.22;

    // Spawning
    state.spawnCD -= 1;
    const spawnRate = Math.max(18, 55 - state.level * 4);
    if (state.spawnCD <= 0) {
      spawnObstacle();
      state.spawnCD = spawnRate + Math.random()*20;
    }
    state.coinCD -= 1;
    if (state.coinCD <= 0) {
      spawnCoin();
      state.coinCD = 60 + Math.random()*60;
    }
    state.powerCD -= 1;
    if (state.powerCD <= 0) {
      spawnPower();
      state.powerCD = 500 + Math.random()*400;
    }

    // Move world
    for (const o of obstacles) o.y += state.speed + (o.vy || 0);
    for (const c of coins) { c.y += state.speed; c.spin += 0.18; }
    for (const p of powers) { p.y += state.speed; p.bob += 0.12; }
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.life--; p.vy *= 0.98;
    }
    particles = particles.filter(p => p.life > 0);

    // Trail particles when boosting
    if (state.nitroActive > 0 || state.boostActive > 0) {
      for (let i = 0; i < 3; i++) {
        particles.push({
          x: player.x + (Math.random()-0.5)*16,
          y: player.y + player.h/2 - 4,
          vx: (Math.random()-0.5)*0.6,
          vy: Math.random()*3+2,
          life: 18 + Math.random()*10,
          color: state.nitroActive>0 ? '#5ad7ff' : '#ffb400',
          r: Math.random()*2+1,
        });
      }
    }

    // Cleanup off-screen
    obstacles = obstacles.filter(o => o.y < H + 100);
    coins = coins.filter(c => c.y < H + 30);
    powers = powers.filter(p => p.y < H + 30);

    // Collisions
    const playerBox = { x: player.x, y: player.y, w: player.w-8, h: player.h-8 };

    // Coins
    for (let i = coins.length - 1; i >= 0; i--) {
      if (circleRect(coins[i], playerBox)) {
        state.coins++;
        addScore(20);
        // sparkle
        for (let j = 0; j < 10; j++) {
          particles.push({
            x: coins[i].x, y: coins[i].y,
            vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
            life: 24, color: '#ffd24a', r: Math.random()*2+1,
          });
        }
        coins.splice(i,1);
      }
    }
    // Powers
    for (let i = powers.length - 1; i >= 0; i--) {
      const p = powers[i];
      const c = { x: p.x, y: p.y, r: p.r };
      if (circleRect(c, playerBox)) {
        if (p.kind === 'shield') { state.shield = 60*5; }
        else { state.nitro++; }
        for (let j = 0; j < 14; j++) {
          particles.push({
            x: p.x, y: p.y,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
            life: 30, color: p.kind==='shield'?'#7dd3fc':'#a78bfa', r: Math.random()*2+1.5,
          });
        }
        powers.splice(i,1);
        updateHUD();
      }
    }
    // Obstacles
    if (state.invuln > 0) state.invuln--;
    if (state.shield > 0) state.shield--;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      if (rectsOverlap(playerBox, o)) {
        if (state.shield > 0) {
          // bust through
          obstacles.splice(i,1);
          for (let j = 0; j < 20; j++) {
            particles.push({
              x: o.x, y: o.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 30, color: '#7dd3fc', r: Math.random()*3+1,
            });
          }
          continue;
        }
        if (state.nitroActive > 0) {
          // smash through during nitro
          obstacles.splice(i,1);
          for (let j = 0; j < 20; j++) {
            particles.push({
              x: o.x, y: o.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 28, color: '#fb923c', r: Math.random()*3+1,
            });
          }
          continue;
        }
        if (state.invuln > 0) continue;
        // hit
        stage.classList.remove('hit'); void stage.offsetWidth; stage.classList.add('hit');
        gameOver();
        return;
      }
    }

    // Passive score & level up
    addScore(1);
    const newLevel = 1 + Math.floor(state.score / 250);
    if (newLevel !== state.level) {
      state.level = newLevel;
      state.baseSpeed = Math.min(16, 6 + (state.level-1) * 0.9);
    }

    updateHUD();
  }

  function addScore(n) {
    state.score += n;
    // every 100 score => +1 nitro
    while (state.score - state.lastScoreNitro >= 100) {
      state.lastScoreNitro += 100;
      state.nitro++;
    }
  }

  // Drawing helpers
  function drawBackground() {
    // grass sides
    ctx.fillStyle = '#0a3a14';
    ctx.fillRect(0, 0, ROAD_LEFT, H);
    ctx.fillRect(ROAD_RIGHT, 0, W - ROAD_RIGHT, H);

    // moving stripes on grass (motion lines)
    ctx.fillStyle = '#0e521b';
    const stripeH = 40;
    const off = state.roadOffset % stripeH;
    for (let y = -stripeH + off; y < H; y += stripeH*2) {
      ctx.fillRect(0, y, ROAD_LEFT, stripeH);
      ctx.fillRect(ROAD_RIGHT, y, W - ROAD_RIGHT, stripeH);
    }

    // road
    const grd = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_RIGHT, 0);
    grd.addColorStop(0, '#1f1f1f');
    grd.addColorStop(0.5, '#2a2a2a');
    grd.addColorStop(1, '#1f1f1f');
    ctx.fillStyle = grd;
    ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);

    // curb (red/white) on edges
    const curbH = 30;
    const cOff = state.roadOffset % (curbH*2);
    for (let y = -curbH*2 + cOff; y < H; y += curbH*2) {
      ctx.fillStyle = '#ff3b3b';
      ctx.fillRect(ROAD_LEFT-8, y, 8, curbH);
      ctx.fillRect(ROAD_RIGHT, y, 8, curbH);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ROAD_LEFT-8, y+curbH, 8, curbH);
      ctx.fillRect(ROAD_RIGHT, y+curbH, 8, curbH);
    }

    // lane dashed lines
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 3;
    ctx.setLineDash([24, 22]);
    ctx.lineDashOffset = -state.roadOffset;
    for (let i = 1; i < LANES; i++) {
      const x = ROAD_LEFT + LANE_W * i;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawCar(x, y, w, h, color, isPlayer) {
    ctx.save();
    ctx.translate(x, y);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    ctx.beginPath(); ctx.ellipse(0, h/2+6, w/2, 6, 0, 0, Math.PI*2); ctx.fill();

    // body
    const grd = ctx.createLinearGradient(0, -h/2, 0, h/2);
    grd.addColorStop(0, color);
    grd.addColorStop(1, shade(color, -30));
    ctx.fillStyle = grd;
    roundRect(ctx, -w/2, -h/2, w, h, 8); ctx.fill();

    // cockpit
    ctx.fillStyle = '#111';
    roundRect(ctx, -w/2+8, -h/2+18, w-16, h*0.42, 6); ctx.fill();
    // windshield highlight
    ctx.fillStyle = 'rgba(180,220,255,.35)';
    roundRect(ctx, -w/2+10, -h/2+20, w-20, 10, 4); ctx.fill();

    // front wing
    ctx.fillStyle = shade(color, -40);
    ctx.fillRect(-w/2-4, -h/2+2, w+8, 6);
    // rear wing
    ctx.fillRect(-w/2-4, h/2-10, w+8, 6);
    ctx.fillRect(-w/2-2, h/2-14, w+4, 4);

    // wheels
    ctx.fillStyle = '#000';
    ctx.fillRect(-w/2-6, -h/2+12, 6, 18);
    ctx.fillRect( w/2,    -h/2+12, 6, 18);
    ctx.fillRect(-w/2-6,  h/2-30, 6, 18);
    ctx.fillRect( w/2,    h/2-30, 6, 18);

    // number / stripe
    ctx.fillStyle = '#fff';
    ctx.fillRect(-2, -h/2+10, 4, h-20);

    if (isPlayer) {
      // headlights
      ctx.fillStyle = '#fff8a8';
      ctx.fillRect(-w/2+4, -h/2+2, 6, 4);
      ctx.fillRect( w/2-10, -h/2+2, 6, 4);
    } else {
      // taillights
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(-w/2+4, h/2-6, 6, 4);
      ctx.fillRect( w/2-10, h/2-6, 6, 4);
    }
    ctx.restore();
  }

  function drawCone(x, y) {
    ctx.save();
    ctx.translate(x, y);
    // base
    ctx.fillStyle = '#222';
    ctx.fillRect(-14, 12, 28, 6);
    // cone
    ctx.fillStyle = '#ff7a00';
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.lineTo(14, 14);
    ctx.lineTo(-14, 14);
    ctx.closePath(); ctx.fill();
    // stripe
    ctx.fillStyle = '#fff';
    ctx.fillRect(-10, -2, 20, 4);
    ctx.restore();
  }

  function drawCoin(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    const s = Math.abs(Math.cos(c.spin));
    ctx.scale(s*0.6 + 0.4, 1);
    const g = ctx.createRadialGradient(0,0,2, 0,0,c.r);
    g.addColorStop(0, '#fff7a8');
    g.addColorStop(1, '#d99a1b');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#8a5a00'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#8a5a00'; ctx.font = 'bold 12px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$', 0, 1);
    ctx.restore();
  }

  function drawPower(p) {
    ctx.save();
    ctx.translate(p.x, p.y + Math.sin(p.bob)*3);
    // glow
    const col = p.kind === 'shield' ? '#7dd3fc' : '#a78bfa';
    const glow = ctx.createRadialGradient(0,0,0, 0,0,p.r*2.2);
    glow.addColorStop(0, col + 'cc');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0,0,p.r*2.2,0,Math.PI*2); ctx.fill();

    // box
    ctx.fillStyle = '#0b1a3a';
    roundRect(ctx, -p.r, -p.r, p.r*2, p.r*2, 5); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.kind === 'shield' ? '🛡' : 'N', 0, 2);
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 40);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawStars() {
    for (const s of bgStars) {
      s.y += s.s;
      if (s.y > H) { s.y = -2; s.x = Math.random()*W; }
    }
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    for (const s of bgStars) {
      if (s.x < ROAD_LEFT || s.x > ROAD_RIGHT) continue;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawShield() {
    if (state.shield <= 0) return;
    const t = performance.now() / 200;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.strokeStyle = `rgba(125,211,252,${0.6 + Math.sin(t)*0.2})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(125,211,252,.25)';
    ctx.beginPath(); ctx.arc(0, 0, 56, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawNitroFlash() {
    if (state.nitroActive <= 0) return;
    ctx.fillStyle = 'rgba(90,215,255,0.08)';
    ctx.fillRect(0,0,W,H);
  }

  function render() {
    ctx.clearRect(0,0,W,H);
    drawBackground();
    drawStars();

    // power-ups
    for (const p of powers) drawPower(p);
    // coins
    for (const c of coins) drawCoin(c);
    // obstacles
    for (const o of obstacles) {
      if (o.type === 'car') drawCar(o.x, o.y, o.w, o.h, o.color, false);
      else drawCone(o.x, o.y);
    }

    drawParticles();

    // player blink during invuln
    if (!(state.invuln > 0 && Math.floor(state.invuln/4)%2===0)) {
      drawCar(player.x, player.y, player.w, player.h, '#ff3b3b', true);
    }
    drawShield();
    drawNitroFlash();

    if (state.paused) {
      ctx.fillStyle = 'rgba(0,0,0,.5)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 56px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('PAUSED', W/2, H/2);
      ctx.font = '18px sans-serif';
      ctx.fillText('按 P 继续', W/2, H/2 + 50);
    }
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();

  // utils
  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);
    c.arcTo(x,y,x+w,y,r);
    c.closePath();
  }
  function shade(hex, pct) {
    const c = hex.replace('#','');
    let r = parseInt(c.substr(0,2),16);
    let g = parseInt(c.substr(2,2),16);
    let b = parseInt(c.substr(4,2),16);
    r = Math.max(0,Math.min(255, r + pct));
    g = Math.max(0,Math.min(255, g + pct));
    b = Math.max(0,Math.min(255, b + pct));
    return `rgb(${r},${g},${b})`;
  }
})();
</script>
</body>
</html>
